<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f0d"/>
      <stop offset="1" stop-color="#0d1411"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3fb56e"/>
    </marker>
  </defs>

  <rect width="920" height="560" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="919" height="559" rx="14" fill="none" stroke="#1d2b24" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="52" fill="#eafff3" font-size="30" font-weight="700">pkgxray</text>
  <text x="180" y="52" fill="#6ee7a0" font-size="15">Analyze before you install</text>
  <text x="40" y="74" fill="#5f7a6c" font-size="12.5">Evidence-based static supply-chain analysis — never executes untrusted code</text>

  <!-- Inputs -->
  <text x="40" y="118" fill="#9bdfb8" font-size="12.5" letter-spacing="1.5">INPUT ADAPTERS</text>
  <g fill="#0f1a15" stroke="#2c4a3a">
    <rect x="40"  y="128" width="120" height="40" rx="7"/>
    <rect x="178" y="128" width="120" height="40" rx="7"/>
    <rect x="316" y="128" width="120" height="40" rx="7"/>
    <rect x="454" y="128" width="120" height="40" rx="7"/>
  </g>
  <g fill="#cfeede" font-size="13" text-anchor="middle">
    <text x="100" y="153">npm:pkg</text>
    <text x="238" y="153">lockfile</text>
    <text x="376" y="153">folder</text>
    <text x="514" y="153">evidence</text>
  </g>
  <path d="M307 168 L307 196" stroke="#3fb56e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Acquisition -->
  <rect x="40" y="200" width="534" height="58" rx="9" fill="#0f1a15" stroke="#2c4a3a"/>
  <text x="56" y="223" fill="#9bdfb8" font-size="12.5" letter-spacing="1">ACQUISITION ENGINE</text>
  <text x="56" y="244" fill="#7fae95" font-size="12">registry metadata · GitHub metadata · provenance (sigstore/SLSA) · OSV</text>
  <path d="M307 258 L307 286" stroke="#3fb56e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Quarantine -->
  <rect x="40" y="290" width="534" height="50" rx="9" fill="#11201a" stroke="#2c4a3a"/>
  <text x="56" y="313" fill="#9bdfb8" font-size="12.5" letter-spacing="1">QUARANTINE ENGINE</text>
  <text x="56" y="331" fill="#7fae95" font-size="12">stage tarball in a private sandbox · no install scripts · no code execution</text>
  <path d="M307 340 L307 368" stroke="#3fb56e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Static analysis -->
  <rect x="40" y="372" width="534" height="100" rx="9" fill="#0f1a15" stroke="#2c4a3a"/>
  <text x="56" y="394" fill="#9bdfb8" font-size="12.5" letter-spacing="1">STATIC ANALYSIS &amp; CORRELATION ENGINE</text>
  <g fill="#0c1712" stroke="#26412f">
    <rect x="56"  y="406" width="150" height="26" rx="5"/>
    <rect x="214" y="406" width="150" height="26" rx="5"/>
    <rect x="372" y="406" width="186" height="26" rx="5"/>
    <rect x="56"  y="438" width="150" height="26" rx="5"/>
    <rect x="214" y="438" width="150" height="26" rx="5"/>
    <rect x="372" y="438" width="186" height="26" rx="5"/>
  </g>
  <g fill="#cfeede" font-size="11.5" text-anchor="middle">
    <text x="131" y="423">credential access</text>
    <text x="289" y="423">persistence</text>
    <text x="465" y="423">prompt injection</text>
    <text x="131" y="455">obfuscation</text>
    <text x="289" y="455">unicode abuse</text>
    <text x="465" y="455">cross-file exfil</text>
  </g>
  <path d="M307 472 L307 500" stroke="#3fb56e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Policy -->
  <rect x="40" y="504" width="534" height="44" rx="9" fill="#11201a" stroke="#2c4a3a"/>
  <text x="56" y="531" fill="#9bdfb8" font-size="12.5" letter-spacing="1">POLICY ENGINE</text>
  <text x="200" y="531" fill="#7fae95" font-size="12">cite-the-evidence verdict</text>

  <!-- Verdicts column -->
  <text x="636" y="118" fill="#9bdfb8" font-size="12.5" letter-spacing="1.5">VERDICT</text>
  <g font-size="14" font-weight="700">
    <rect x="636" y="132" width="244" height="58" rx="9" fill="#0e2017" stroke="#2f7d4f"/>
    <text x="660" y="167" fill="#46d07d">● SAFE</text>
    <text x="760" y="167" fill="#6f9d83" font-size="11.5" font-weight="400">promote / install</text>

    <rect x="636" y="200" width="244" height="58" rx="9" fill="#221d0c" stroke="#7d6a2f"/>
    <text x="660" y="235" fill="#e2c558">● REVIEW</text>
    <text x="772" y="235" fill="#9d9070" font-size="11.5" font-weight="400">inspect first</text>

    <rect x="636" y="268" width="244" height="58" rx="9" fill="#22110f" stroke="#7d3a2f"/>
    <text x="660" y="303" fill="#e8634f">● BLOCK</text>
    <text x="772" y="303" fill="#9d7470" font-size="11.5" font-weight="400">do not install</text>
  </g>

  <!-- Surfaces -->
  <text x="636" y="372" fill="#9bdfb8" font-size="12.5" letter-spacing="1.5">SURFACES</text>
  <g fill="#0f1a15" stroke="#2c4a3a">
    <rect x="636" y="384" width="116" height="38" rx="7"/>
    <rect x="764" y="384" width="116" height="38" rx="7"/>
    <rect x="636" y="432" width="116" height="38" rx="7"/>
    <rect x="764" y="432" width="116" height="38" rx="7"/>
  </g>
  <g fill="#cfeede" font-size="12.5" text-anchor="middle">
    <text x="694" y="408">CLI</text>
    <text x="822" y="408">MCP server</text>
    <text x="694" y="456">JSON API</text>
    <text x="822" y="456">browser ext</text>
  </g>

  <!-- connecting arrows policy->verdict -->
  <path d="M574 526 C 610 526, 610 297, 634 297" fill="none" stroke="#3fb56e" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
